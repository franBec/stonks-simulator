spring:
  application:
    name: stonks_java
  datasource:
    url: jdbc:h2:mem:stonks;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:stonks-schema.sql
      data-locations: classpath:stonks-data.sql
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: modulith
  otlp:
    metrics:
      export:
        enabled: false

stonks:
  cobol:
    programs:
      trade-validator:
        path: "../stonks_cobol/bin/trade-validator"
        timeout-seconds: 5
      price-engine:
        path: "../stonks_cobol/bin/price-engine"
        timeout-seconds: 5
      catalog:
        path: "../stonks_cobol/bin/catalog"
        timeout-seconds: 5
  market:
    simulation:
      interval-ms: 2000
