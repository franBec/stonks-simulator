spring:
  application:
    name: stonks_java
  ai:
    openai:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      chat:
        options:
          model: meta-llama/llama-3.1-8b-instruct
  sql:
    init:
      mode: always
      schema-locations: classpath:stonks-schema.sql
      data-locations: classpath:stonks-data.sql
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterWrite=60s

management:
  endpoints:
    web:
      exposure:
        include: modulith,health
  otlp:
    metrics:
      export:
        enabled: ${stonks.adapters.otel:false}

stonks:
  adapters:
    db: h2
    cobol: stub
    ai: stub
    news: stub
    otel: false
  cobol:
    programs:
      price-engine:
        path: "../stonks_cobol/bin/price-engine"
        timeout-seconds: 5
      catalog:
        path: "../stonks_cobol/bin/catalog"
        timeout-seconds: 5
      portfolio-mgr:
        path: "../stonks_cobol/bin/portfolio-mgr"
        timeout-seconds: 5
  market:
    simulation:
      interval-ms: 5000
    price:
      persist-interval-ms: 60000
  broadcast:
    sse-timeout-ms: 300000
    heartbeat-rate-ms: 15000
    trade-paper-tape-format: "TRADE | %s %d %s @ $%.2f | TOTAL: $%.2f"
  news:
    rss:
      feed-urls:
        - https://feeds.bbci.co.uk/news/technology/rss.xml
        - https://techcrunch.com/feed/
        - https://www.theguardian.com/uk/business/rss
  chaos:
    enabled: true
    event-check-interval-ms: 30000
  logging:
    max-collection-print-size: 3
    adapter-out:
      exclude-patterns: "StockPriceEngineCobolAdapter"

resilience4j:
  ratelimiter:
    instances:
      ai-chaos-per-minute:
        limit-for-period: 20
        limit-refresh-period: 1m
        timeout-duration: 0
      ai-chaos-per-day:
        limit-for-period: 50
        limit-refresh-period: 24h
        timeout-duration: 0
